<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Dope Shop — Doppest Gadgets in your hands</title>

<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;600;700&display=swap" rel="stylesheet">

<style>
*{margin:0;padding:0;box-sizing:border-box;font-family:'Poppins',sans-serif}
body{background:#f4f7fb;color:#111}
header{background:#0f172a;color:#fff;padding:20px;text-align:center}
header h1{font-size:26px}
header p{font-size:14px;opacity:.8}

.filters{display:flex;gap:10px;overflow-x:auto;padding:15px}
.filters button{
  padding:8px 14px;
  border:none;
  background:#e2e8f0;
  border-radius:20px;
  cursor:pointer;
  white-space:nowrap;
}
.filters button.active{background:#0f172a;color:#fff}

.products{
  display:grid;
  grid-template-columns:repeat(auto-fit,minmax(160px,1fr));
  gap:15px;
  padding:15px;
}
.card{
  background:#fff;
  border-radius:10px;
  overflow:hidden;
  box-shadow:0 4px 10px rgba(0,0,0,.05);
  transition:.3s;
}
.card:hover{transform:translateY(-3px)}
.card img{width:100%;height:160px;object-fit:cover}
.card-content{padding:10px}
.card-content h3{font-size:14px;margin-bottom:4px}
.price{font-weight:600;color:#0f172a}
.card-content p{font-size:12px;color:#555;margin:5px 0}
.card-content button{
  width:100%;
  padding:8px;
  border:none;
  background:#2563eb;
  color:#fff;
  border-radius:6px;
  cursor:pointer;
}

.cart-icon{
  position:fixed;
  bottom:20px;
  right:20px;
  background:#0f172a;
  color:#fff;
  width:55px;
  height:55px;
  border-radius:50%;
  display:flex;
  align-items:center;
  justify-content:center;
  font-size:22px;
  cursor:pointer;
}
.cart-count{
  position:absolute;
  top:-5px;
  right:-5px;
  background:red;
  color:#fff;
  font-size:12px;
  width:20px;
  height:20px;
  border-radius:50%;
  display:flex;
  align-items:center;
  justify-content:center;
}

.cart-modal{
  position:fixed;
  top:0;right:-100%;
  width:100%;max-width:400px;
  height:100%;
  background:#fff;
  box-shadow:-2px 0 10px rgba(0,0,0,.1);
  transition:.3s;
  display:flex;
  flex-direction:column;
  z-index:1000;
}
.cart-modal.open{right:0}
.cart-header{
  padding:15px;
  background:#0f172a;
  color:#fff;
  display:flex;
  justify-content:space-between;
}
.cart-items{flex:1;overflow-y:auto;padding:10px}
.cart-item{
  border-bottom:1px solid #ddd;
  padding:10px 0;
}
.qty-controls{
  display:flex;
  gap:8px;
  margin-top:5px;
}
.qty-controls button{
  padding:3px 8px;
  border:none;
  background:#e2e8f0;
  cursor:pointer;
}
.total{
  padding:15px;
  font-weight:600;
}
.checkout-btn{
  margin:10px;
  padding:12px;
  border:none;
  background:#16a34a;
  color:#fff;
  border-radius:6px;
  cursor:pointer;
}

.checkout-form{
  padding:10px;
}
.checkout-form input,
.checkout-form textarea{
  width:100%;
  margin-bottom:10px;
  padding:8px;
  border:1px solid #ccc;
  border-radius:6px;
}
.checkout-form button{
  width:100%;
  padding:12px;
  border:none;
  background:#2563eb;
  color:#fff;
  border-radius:6px;
  cursor:pointer;
}

.whatsapp-btn{
  position:fixed;
  bottom:90px;
  right:20px;
  background:#25D366;
  color:#fff;
  padding:12px 15px;
  border-radius:30px;
  text-decoration:none;
  font-size:14px;
}
.confirmation{
  padding:20px;
  text-align:center;
  color:#16a34a;
}
</style>
</head>
<body>

<header>
<h1>Dope Shop —</h1>
<p>Doppest Gadgets in your hands | Ludhiana, Punjab</p>
</header>
<nav>
<a href="index.html">Home</a>
<a href="about.html">About</a>
<a href="products.html">Products</a>
<a href="contact.html">Contact</a>
</nav>
<div class="filters" id="filters"></div>
<div class="products" id="productList"></div>

<div class="cart-icon" onclick="toggleCart()">
🛒
<div class="cart-count" id="cartCount">0</div>
</div>

<div class="cart-modal" id="cartModal">
<div class="cart-header">
<h3>Your Cart</h3>
<button onclick="toggleCart()" style="background:none;border:none;color:#fff;font-size:18px">✕</button>
</div>
<div class="cart-items" id="cartItems"></div>
<div class="total" id="cartTotal">Total: ₹0</div>
<button class="checkout-btn" onclick="showCheckout()">Place Order</button>

<form class="checkout-form" id="checkoutForm" 
method="POST"
action="https://formspree.io/f/mjgendqe">
<input type="hidden" name="orderSummary" id="orderSummary">
<input type="text" name="name" placeholder="Your Name" required>
<input type="tel" name="phone" placeholder="Phone Number" required>
<textarea name="address" placeholder="Delivery Address" required></textarea>
<textarea name="instructions" placeholder="Any special instructions"></textarea>
<button type="submit">Submit Order</button>
</form>

<div class="confirmation" id="confirmation" style="display:none">
Order placed! Dope Shop will contact you on WhatsApp to confirm.
</div>

</div>

<a class="whatsapp-btn" href="https://wa.me/917652922927" target="_blank">Chat on WhatsApp</a>

<script>
const products=[
{id:1,name:"Slim Net",price:2199,category:"Watches",img:"https://i.ibb.co/B2S77fRN/adrian-regeci-ras-Qrixx1-P0-unsplash.jpg",desc:"Count Every Step"},
{id:2,name:"Slim Pro",price:2399,category:"Watches",img:"https://i.ibb.co/CKYHz0xB/reet-talreja-W61t9b27mpc-unsplash.jpg",desc:"Everything you need is in your hand"},
{id:3,name:"Dope Head",price:2999,category:"Headphones",img:"https://i.ibb.co/BVNMFYQ9/Headphones.jpg",desc:"Feel the Beat"},
{id:4,name:"Gimbal Pro",price:3699,category:"Accessories",img:"https://i.ibb.co/21SrQ2sr/Gimble.jpg",desc:"Precision in every frame"},
{id:5,name:"Urban Watch X",price:1999,category:"Watches",img:"https://i.ibb.co/CKYHz0xB/reet-talreja-W61t9b27mpc-unsplash.jpg",desc:"Style meets tech"},
{id:6,name:"Zoom Cam Lite",price:5499,category:"Cameras",img:"https://i.ibb.co/B2S77fRN/adrian-regeci-ras-Qrixx1-P0-unsplash.jpg",desc:"Capture the moment"},
{id:7,name:"Bass Pro Max",price:3499,category:"Headphones",img:"https://i.ibb.co/BVNMFYQ9/Headphones.jpg",desc:"Deep immersive sound"},
{id:8,name:"Tripod Flex",price:999,category:"Accessories",img:"https://i.ibb.co/21SrQ2sr/Gimble.jpg",desc:"Flexible stability"}
];

let cart=JSON.parse(localStorage.getItem("cart"))||[];

const productList=document.getElementById("productList");
const filters=document.getElementById("filters");

function renderProducts(filter="All"){
productList.innerHTML="";
products.filter(p=>filter==="All"||p.category===filter)
.forEach(p=>{
productList.innerHTML+=`
<div class="card">
<img src="${p.img}" alt="${p.name}" loading="lazy">
<div class="card-content">
<h3>${p.name}</h3>
<div class="price">₹${p.price}</div>
<p>${p.desc}</p>
<button onclick="addToCart(${p.id})">Add to Cart</button>
</div>
</div>
`;
});
}

function renderFilters(){
const categories=["All",...new Set(products.map(p=>p.category))];
categories.forEach(cat=>{
const btn=document.createElement("button");
btn.textContent=cat;
btn.onclick=()=>{document.querySelectorAll('.filters button').forEach(b=>b.classList.remove('active'));btn.classList.add('active');renderProducts(cat)};
filters.appendChild(btn);
});
filters.firstChild.classList.add("active");
}

function addToCart(id){
const item=cart.find(i=>i.id===id);
if(item){item.qty++}else{cart.push({...products.find(p=>p.id===id),qty:1})}
updateCart();
}

function updateCart(){
localStorage.setItem("cart",JSON.stringify(cart));
document.getElementById("cartCount").textContent=cart.reduce((a,b)=>a+b.qty,0);
renderCart();
}

function renderCart(){
const cartItems=document.getElementById("cartItems");
cartItems.innerHTML="";
let total=0;
cart.forEach(item=>{
const subtotal=item.price*item.qty;
total+=subtotal;
cartItems.innerHTML+=`
<div class="cart-item">
<strong>${item.name}</strong><br>
₹${item.price} x ${item.qty} = ₹${subtotal}
<div class="qty-controls">
<button onclick="changeQty(${item.id},-1)">-</button>
<button onclick="changeQty(${item.id},1)">+</button>
<button onclick="removeItem(${item.id})">Remove</button>
</div>
</div>
`;
});
document.getElementById("cartTotal").textContent="Total: ₹"+total;
}

function changeQty(id,change){
const item=cart.find(i=>i.id===id);
if(item){item.qty+=change;if(item.qty<=0)cart=cart.filter(i=>i.id!==id)}
updateCart();
}

function removeItem(id){
cart=cart.filter(i=>i.id!==id);
updateCart();
}

function toggleCart(){
document.getElementById("cartModal").classList.toggle("open");
}

function showCheckout(){
document.getElementById("checkoutForm").style.display="block";
}

document.getElementById("checkoutForm").addEventListener("submit",function(){
let summary="";
let total=0;
cart.forEach(item=>{
summary+=`${item.name} - Qty:${item.qty} - ₹${item.price*item.qty}\n`;
total+=item.price*item.qty;
});
summary+="\nTotal: ₹"+total;
document.getElementById("orderSummary").value=summary;
localStorage.removeItem("cart");
cart=[];
updateCart();
document.getElementById("confirmation").style.display="block";
});

renderFilters();
renderProducts();
updateCart();
</script>

</body>
</html>
